name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        uses: NiklasPlessing/buildozer-action@v1.2
        with:
          buildozer_version: master
          python_version: 3.8
          
