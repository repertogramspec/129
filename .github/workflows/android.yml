name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf autogen libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev ant
          pip install --upgrade pip
          pip install "cython<3.0.0" "setuptools<66.0.0" buildozer
      - name: Build
        run: |
          export CFLAGS="-O2"
          yes | buildozer android debug
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-APK
          path: bin/*.apk
          
